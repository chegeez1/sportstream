kind = "web"
previewPath = "/"
title = "SportStream — Live Sports Scores"
version = "1.0.0"
id = "artifacts/sportstream"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23118

[services.development]
run = "pnpm --filter @workspace/sportstream run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sportstream", "run", "build" ]
publicDir = "artifacts/sportstream/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23118"
BASE_PATH = "/"
